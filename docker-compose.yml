services:
  mongo:
    image: mongo:8.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: race
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-race-local}
      MONGO_INITDB_DATABASE: race_data
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mongo_data:/data/db

  api:
    build: ./backend
    environment: &backend-env
      MONGODB_URL: mongodb://race:${MONGO_PASSWORD:-race-local}@mongo:27017/race_data?authSource=admin
      MONGODB_DATABASE: race_data
      FASTF1_CACHE: /cache/fastf1
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      HISTORICAL_BACKFILL_ENABLED: ${HISTORICAL_BACKFILL_ENABLED:-false}
      HISTORICAL_BACKFILL_START: ${HISTORICAL_BACKFILL_START:-1950}
      TELEMETRY_BACKFILL_ENABLED: ${TELEMETRY_BACKFILL_ENABLED:-false}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/ready')"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - fastf1_cache:/cache

  archive:
    build: ./backend
    command:
      - python
      - -m
      - app.backfill
      - --start
      - ${HISTORICAL_BACKFILL_START:-2000}
      - --end
      - "2026"
      - --until-complete
    environment: *backend-env
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - fastf1_cache:/cache

  timing:
    build: ./backend
    command:
      - python
      - -m
      - app.timing_backfill
      - --start
      - "2018"
      - --end
      - "2026"
      - --until-complete
    environment: *backend-env
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - fastf1_cache:/cache

  worker:
    build: ./backend
    command: python -m app.worker
    environment: *backend-env
    depends_on:
      mongo:
        condition: service_healthy
      archive:
        condition: service_completed_successfully
      timing:
        condition: service_completed_successfully
    volumes:
      - fastf1_cache:/cache

  scheduler:
    build: ./backend
    command: python -m app.scheduler
    environment: *backend-env
    depends_on:
      mongo:
        condition: service_healthy
      archive:
        condition: service_completed_successfully
      timing:
        condition: service_completed_successfully

  web:
    build: ./frontend
    environment:
      PORT: 80
      API_SCHEME: http
      API_HOSTPORT: api:8000
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  mongo_data:
  fastf1_cache:
