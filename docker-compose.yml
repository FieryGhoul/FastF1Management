services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: race_data
      POSTGRES_USER: race
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-race-local}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U race -d race_data"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build: ./backend
    command: alembic upgrade head
    environment: &backend-env
      DATABASE_URL: postgresql+psycopg://race:${POSTGRES_PASSWORD:-race-local}@db:5432/race_data
      FASTF1_CACHE: /cache/fastf1
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./backend
    environment: *backend-env
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - fastf1_cache:/cache/fastf1

  worker:
    build: ./backend
    command: python -m app.worker
    environment: *backend-env
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - fastf1_cache:/cache/fastf1

  web:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  fastf1_cache:

